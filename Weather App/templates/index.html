<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather API</title>
</head>
<body>
    <h1>Weather API</h1>
    <h2>Welcome to the Weather API! Use the /weather endpoint to get the current weather data for a specific city.</h2>
    <h3>Type a city name to get its weather information:</h3>
    <form action="/weather" method="get">
        <input type="text" name="city" placeholder="Enter city name" required>
        <button type="submit">Get Weather</button>
    </form>

</body>
</html>
